appId: sh.zhouj.deerflow.desktop
productName: DeerFlow
directories:
  output: release
files:
  - dist/**
  - package.json
extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"
mac:
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - zip
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
